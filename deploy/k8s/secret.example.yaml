# TEMPLATE ONLY — never commit real values. Two ways to create the real thing:
#
#   1. From the local .env (simplest):
#        kubectl -n protopro create secret generic protopro-secrets --from-env-file=.env
#
#   2. Copy this file to secret.yaml (gitignored), fill values, apply it.
#
# In a managed cluster, prefer the platform's secret store (External Secrets
# Operator, Sealed Secrets, or the cloud provider's KMS-backed store) over
# hand-applied Secret objects.

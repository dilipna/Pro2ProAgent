# ProToPro web: Deployment + Service + HPA.
#
# The web tier is stateless (ISR cache is per-pod and rebuilt on demand;
# every page degrades to seeded content if the API is unreachable), so it
# scales horizontally — this is where the HPA lives, deliberately not on the
# single-writer API.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: protopro-web
  namespace: protopro
  labels:
    app.kubernetes.io/name: protopro-web
    app.kubernetes.io/part-of: protopro
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: protopro-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: protopro-web
        app.kubernetes.io/part-of: protopro
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: web
          # Replace with your registry once CI pushes images.
          image: protopro-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PROTOPRO_API_URL
              # Service DNS within the namespace; server-side only.
              value: http://protopro-api:8000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: protopro-web
  namespace: protopro
  labels:
    app.kubernetes.io/name: protopro-web
    app.kubernetes.io/part-of: protopro
spec:
  selector:
    app.kubernetes.io/name: protopro-web
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: protopro-web
  namespace: protopro
  labels:
    app.kubernetes.io/part-of: protopro
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: protopro-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
